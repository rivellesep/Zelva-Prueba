<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelva</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css">

    <style>
        body {
            background-color: #121212;
            color: #E8F5E9;
            font-family: Arial, sans-serif;
        }

        .titulo {
            text-align: center;
            margin: 30px;
            color: #1A5C52;
        }

        .card {
            background-color: #1E1E1E;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, select, textarea {
            background-color: #1E1E1E !important;
            color: #E8F5E9 !important;
            border: 1px solid #388E3C !important;
        }

        .btn-main {
            background-color: #2E7D32;
            color: white;
        }

        .btn-main:hover {
            background-color: #1A5C52;
        }

        .table {
            background-color: #1E1E1E;
            color: #E8F5E9;
        }

        .table th {
            background-color: #1A5C52;
        }
    </style>
</head>

<body>

<h1 class="titulo">Zelva Marketplace</h1>

<div class="container">

    <!-- LOGIN -->
    <div class="card" id="loginForm">
        <h4>Login</h4>
        <input type="email" placeholder="Email" class="form-control mb-2">
        <input type="password" placeholder="Password" class="form-control mb-2">
        <button class="btn btn-main">Entrar</button>
        <button class="btn btn-outline-light">Registrar</button>
    </div>

    <!-- PERFIL -->
    <div class="card" id="profileForm">
        <h4>Perfil</h4>
        <input type="text" placeholder="Nom" class="form-control mb-2">
        <input type="text" placeholder="Localització" class="form-control mb-2">
        <input type="number" placeholder="EcoPoints" class="form-control mb-2">
    </div>

    <!-- CREAR ANUNCIO -->
    <div class="card">
        <h4>Nou anunci</h4>

        <input type="text" placeholder="Títol" class="form-control mb-2">
        <textarea placeholder="Descripció" class="form-control mb-2"></textarea>

        <select class="form-control mb-2">
            <option>Categoria</option>
            <option>Roba</option>
            <option>Electrònica</option>
            <option>Llar</option>
        </select>

        <select class="form-control mb-2">
            <option>Estat</option>
            <option>Nou</option>
            <option>Bon estat</option>
            <option>Acceptable</option>
        </select>

        <select class="form-control mb-2">
            <option>Modalitat</option>
            <option>Intercanvi</option>
            <option>Donació</option>
            <option>Punts</option>
        </select>

        <input type="text" placeholder="Ubicació" class="form-control mb-2">
        <input type="file" multiple class="form-control mb-2">

        <button class="btn btn-main">Guardar anunci</button>
    </div>

    <!-- FILTROS -->
    <div class="card">
        <h4>Cercador</h4>

        <input type="text" placeholder="Buscar..." class="form-control mb-2">

        <select class="form-control mb-2">
            <option>Categoria</option>
        </select>

        <select class="form-control mb-2">
            <option>Modalitat</option>
        </select>

        <select class="form-control mb-2">
            <option>Estat</option>
        </select>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h4>Anuncis</h4>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Títol</th>
                    <th>Descripció</th>
                    <th>Modalitat</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bicicleta</td>
                    <td>En bon estat</td>
                    <td>Intercanvi</td>
                    <td>
                        <button class="btn btn-sm btn-main">Editar</button>
                        <button class="btn btn-sm btn-danger">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- VALORACIONES -->
    <div class="card">
        <h4>Valoracions</h4>

        <select class="form-control mb-2">
            <option>⭐ 1</option>
            <option>⭐ 2</option>
            <option>⭐ 3</option>
            <option>⭐ 4</option>
            <option>⭐ 5</option>
        </select>

        <textarea placeholder="Comentari..." class="form-control mb-2"></textarea>

        <button class="btn btn-main">Enviar valoració</button>
    </div>

    <!-- CHAT (estructura básica) -->
    <div class="card">
        <h4>Missatges</h4>

        <div style="height:150px; background:#121212; margin-bottom:10px;"></div>

        <input type="text" placeholder="Escriu un missatge..." class="form-control mb-2">
        <button class="btn btn-main">Enviar</button>
    </div>

</div>

</body>
</html>
